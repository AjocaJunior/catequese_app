name: catequese_app
description: "App de gestão catequética"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  printing: ^5.14.3
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  assets:
    - assets/images/icone_comunidade.png

# Ícone da app (Android + Web/favicon), gerado a partir do ícone da comunidade.
# Depois de "flutter pub get", corre: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icone_comunidade.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icone_comunidade.png"
  web:
    generate: true
    image_path: "assets/images/icone_comunidade.png"
    background_color: "#FFFFFF"
    theme_color: "#3F51B5"
